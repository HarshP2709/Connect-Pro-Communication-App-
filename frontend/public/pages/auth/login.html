<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — ConnectPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/design-system.css">
  <style>
    body { background: var(--gradient-hero); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: var(--space-4); }

    .auth-container { width: 100%; max-width: 460px; }

    .auth-logo { display: flex; align-items: center; gap: var(--space-3); justify-content: center; margin-bottom: var(--space-8); }
    .auth-logo-text { font-size: var(--text-2xl); font-weight: 900; }

    .auth-card {
      background: var(--bg-card);
      backdrop-filter: var(--blur-lg);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-2xl);
      padding: var(--space-10);
      box-shadow: var(--shadow-xl), var(--shadow-glow);
    }

    .auth-title { font-size: var(--text-3xl); font-weight: 800; margin-bottom: var(--space-2); }
    .auth-subtitle { color: var(--text-muted); font-size: var(--text-sm); margin-bottom: var(--space-8); }

    .auth-form { display: flex; flex-direction: column; gap: var(--space-5); }

    .divider-text {
      display: flex; align-items: center; gap: var(--space-3);
      color: var(--text-muted); font-size: var(--text-xs); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin: var(--space-4) 0;
    }
    .divider-text::before, .divider-text::after { content: ''; flex: 1; height: 1px; background: var(--border-color); }

    .auth-footer { text-align: center; margin-top: var(--space-6); font-size: var(--text-sm); color: var(--text-muted); }
    .auth-footer a { color: var(--text-accent); font-weight: 600; }

    .orb-bg { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); }
    .orb-1 { width: 500px; height: 500px; background: rgba(99,102,241,0.12); top: -200px; right: -150px; animation: float 8s ease-in-out infinite; }
    .orb-2 { width: 400px; height: 400px; background: rgba(168,85,247,0.08);  bottom: -150px; left: -100px; animation: float 10s ease-in-out infinite reverse; }
    .auth-container { position: relative; z-index: 1; }

    .sso-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      padding: 12px;
      background: var(--bg-glass);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      transition: all var(--transition-base);
      backdrop-filter: var(--blur-sm);
    }
    .sso-btn:hover { background: var(--bg-glass-hover); border-color: rgba(255,255,255,0.15); }

    .password-toggle { cursor: pointer; color: var(--text-muted); transition: color var(--transition-fast); }
    .password-toggle:hover { color: var(--text-primary); }

    .error-message { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius-md); padding: var(--space-3) var(--space-4); font-size: var(--text-sm); color: var(--red-400); display: none; }
    .error-message.visible { display: block; }
  </style>
</head>
<body>
  <div id="toast-container"></div>

  <div class="orb-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="auth-container fade-in">
    <div class="auth-logo">
      <div class="logo-icon">🎥</div>
      <span class="auth-logo-text gradient-text">ConnectPro</span>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your ConnectPro account</p>

      <div id="error-banner" class="error-message"></div>

      <form class="auth-form" id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-group">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" name="email" class="form-input" placeholder="you@company.com" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <label class="form-label" for="password">Password</label>
            <a href="forgot-password.html" style="font-size:var(--text-xs);color:var(--text-accent)">Forgot password?</a>
          </div>
          <div class="input-group">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" name="password" class="form-input" placeholder="Your password" required autocomplete="current-password">
            <span class="input-suffix password-toggle" id="toggle-pwd">👁️</span>
          </div>
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between">
          <label class="checkbox-group" for="remember-me">
            <input type="checkbox" id="remember-me">
            <div class="checkbox-custom">
              <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
            </div>
            <span style="font-size:var(--text-sm);color:var(--text-secondary)">Remember me for 30 days</span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary w-full btn-lg" id="login-btn">
          <span id="login-text">Sign In →</span>
          <span id="login-spinner" class="spinner hidden"></span>
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one free</a>
      </div>
    </div>
  </div>

  <script src="../../js/app.js"></script>
  <script src="../../js/auth.js"></script>
</body>
</html>
