<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — ConnectPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/design-system.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--gradient-hero); text-align: center; padding: var(--space-6); }
    .error-code { font-size: 120px; font-weight: 900; line-height: 1; }
    .error-code span { -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; background-image: var(--gradient-brand); }
  </style>
</head>
<body>
  <div>
    <div class="error-code"><span>404</span></div>
    <h2 style="font-size:var(--text-2xl);font-weight:800;margin-top:var(--space-4)">Page Not Found</h2>
    <p style="color:var(--text-muted);max-width:400px;margin:var(--space-4) auto">The page you're looking for doesn't exist or has been moved.</p>
    <div style="display:flex;gap:var(--space-3);justify-content:center;margin-top:var(--space-8)">
      <a href="index.html" class="btn btn-secondary">← Home</a>
      <a href="pages/dashboard/index.html" class="btn btn-primary">Dashboard →</a>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
