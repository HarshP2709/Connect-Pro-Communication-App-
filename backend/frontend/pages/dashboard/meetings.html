<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meetings — ConnectPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/design-system.css">
  <style>
    .meeting-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-xl);
      padding: var(--space-5);
      transition: all var(--transition-base);
      box-shadow: var(--shadow-card);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .meeting-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gradient-card);
      opacity: 0;
      transition: opacity var(--transition-base);
    }

    .meeting-card:hover {
      transform: translateY(-3px);
      border-color: rgba(99, 102, 241, 0.3);
      box-shadow: var(--shadow-xl);
    }

    .meeting-card:hover::before {
      opacity: 1;
    }

    .meeting-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: var(--text-xs);
      font-weight: 600;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-active {
      color: var(--green-400);
    }

    .status-dot.active {
      background: var(--green-400);
      animation: pulse 2s ease infinite;
    }

    .status-scheduled {
      color: var(--yellow-400);
    }

    .status-dot.scheduled {
      background: var(--yellow-400);
    }

    .status-ended {
      color: var(--text-muted);
    }

    .status-dot.ended {
      background: var(--text-muted);
    }

    .status-cancelled {
      color: var(--red-400, #f87171);
    }

    .status-dot.cancelled {
      background: var(--red-400, #f87171);
    }

    .meeting-title {
      font-size: var(--text-base);
      font-weight: 700;
      margin: var(--space-3) 0 var(--space-2);
    }

    .meeting-meta {
      display: flex;
      gap: var(--space-4);
      font-size: var(--text-xs);
      color: var(--text-muted);
      flex-wrap: wrap;
    }

    .meeting-actions {
      display: flex;
      gap: var(--space-2);
      margin-top: var(--space-4);
    }

    .meetings-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-5);
    }

    @media(max-width:1100px) {
      .meetings-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media(max-width:700px) {
      .meetings-grid {
        grid-template-columns: 1fr;
      }
    }

    .tab-bar {
      display: flex;
      gap: var(--space-1);
      border-bottom: 1px solid var(--border-color);
      margin-bottom: var(--space-6);
    }

    .tab-btn {
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }

    .tab-btn.active {
      color: #a78bfa;
      border-bottom-color: #a78bfa;
    }

    .tab-btn:hover {
      color: var(--text-primary);
    }
  </style>
</head>

<body>
  <div id="toast-container"></div>
  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">🎥</div>
        <span class="logo-text">ConnectPro</span>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-title">Main</div>
        <a href="index.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
          </svg>
          Dashboard
        </a>
        <a href="meetings.html" class="nav-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
              d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.259a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z" />
          </svg>
          Meetings
        </a>
        <a href="schedule.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />

          Schedule

        <a href="history.html" class="nav-item">

            <circle cx="12" cy="12" r="10" />

          History
        </a>
        <div class="nav-section-title" style="margin-top:12px">Collaboration</div>
        <a href="whiteboard.html" class="nav-item">

        <a href="files.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" />
          </svg>

        </a>
        <div class="nav-section-title" style="margin-top:12px">Account</div>
        <a href="notifications.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" />
          </svg>
          Notifications
        </a>
        <a href="profile.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          Profile
        </a>
        <a href="settings.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" />
          </svg>
          Settings
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-card">
          <div class="avatar avatar-md avatar-purple" id="nav-avatar">?</div>
          <div style="flex:1;min-width:0">
            <div class="user-name" id="nav-name">Loading...</div>
            <div class="user-role" id="nav-role">—</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content" id="main-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">🎬 Meetings</h1>
          <p style="font-size:var(--text-sm);color:var(--text-muted);margin-top:2px">All your meetings in one place</p>
        </div>
        <div style="display:flex;gap:var(--space-3);align-items:center">
          <button class="btn btn-ghost btn-icon" id="theme-toggle">🌙</button>
          <button class="btn btn-secondary" id="join-btn">🔗 Join</button>
          <button class="btn btn-primary" id="new-btn">+ New Meeting</button>
        </div>
      </div>

      <div class="page-content">
        <!-- Search + tab bar -->
        <div style="display:flex;gap:var(--space-3);margin-bottom:var(--space-4);flex-wrap:wrap;align-items:center">
          <div class="input-group" style="max-width:280px">
            <span class="input-icon">🔍</span>
            <input type="text" id="search-input" class="form-input" placeholder="Search meetings...">
          </div>
          <span style="font-size:var(--text-sm);color:var(--text-muted);margin-left:auto" id="count-label"></span>
        </div>

        <div class="tab-bar">
          <button class="tab-btn active" data-tab="active">Active</button>
          <button class="tab-btn" data-tab="scheduled">Scheduled</button>
          <button class="tab-btn" data-tab="ended">Past</button>
          <button class="tab-btn" data-tab="">All</button>
        </div>

        <div id="meetings-grid">
          <div class="skeleton" style="height:160px;border-radius:16px;margin-bottom:12px"></div>
          <div class="skeleton" style="height:160px;border-radius:16px;margin-bottom:12px;opacity:.7"></div>
        </div>

        <div style="display:flex;justify-content:center;gap:var(--space-2);margin-top:var(--space-8)" id="pagination">
        </div>
      </div>
    </main>
  </div>

  <!-- New Meeting Modal -->
  <div class="modal-overlay hidden" id="new-meeting-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">🎬 Create New Meeting</h3>
        <button class="btn btn-ghost btn-icon modal-close" id="close-new-modal">✕</button>
      </div>
      <form id="new-meeting-form" style="display:flex;flex-direction:column;gap:var(--space-4)">
        <div class="form-group">
          <label class="form-label">Meeting Title *</label>
          <input type="text" id="m-title" class="form-input" placeholder="Weekly team standup" required>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" id="m-desc" placeholder="What is this meeting about?"
            style="min-height:72px"></textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4)">
          <div class="form-group">
            <label class="form-label">Date &amp; Time</label>
            <input type="datetime-local" id="m-scheduled" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">Max Participants</label>
            <select id="m-max" class="form-select">
              <option value="10">10</option>
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100" selected>100</option>
              <option value="300">300</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password (optional)</label>
          <input type="text" id="m-password" class="form-input" placeholder="Leave blank for no password">
        </div>
        <div style="display:flex;align-items:center">
          <label class="checkbox-group">
            <input type="checkbox" id="m-waiting" checked>
            <div class="checkbox-custom"><svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="2" stroke-linecap="round" />
              </svg></div>
            <span style="font-size:var(--text-sm)">Enable waiting room</span>
          </label>
        </div>
        <div style="display:flex;gap:var(--space-3);margin-top:var(--space-2)">
          <button type="button" class="btn btn-secondary flex-1" id="cancel-new-modal">Cancel</button>
          <button type="submit" class="btn btn-primary flex-1" id="create-btn">
            <span id="create-text">Create Meeting →</span>
            <span id="create-spinner" class="spinner hidden"></span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Join Modal -->
  <div class="modal-overlay hidden" id="join-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">🔗 Join a Meeting</h3>
        <button class="btn btn-ghost btn-icon" id="close-join-modal">✕</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:var(--space-4);margin-top:var(--space-4)">
        <div class="form-group">
          <label class="form-label">Meeting ID</label>
          <div class="input-group">
            <span class="input-icon">📋</span>
            <input type="text" id="join-id" class="form-input" placeholder="abc-1234-def">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password (if required)</label>
          <div class="input-group">
            <span class="input-icon">🔒</span>
            <input type="password" id="join-password" class="form-input" placeholder="Password">
          </div>
        </div>
        <button class="btn btn-primary w-full" id="join-confirm">Join Meeting →</button>
      </div>
    </div>
  </div>

  <script src="../../js/app.js"></script>
  <script>
    'use strict';
    let currentTab = 'active';
    let currentPage = 1;
    const PAGE_SIZE = 12;

    document.addEventListener('DOMContentLoaded', async () => {
      if (!Auth.requireAuth()) return;
      const user = Auth.getUser() || await Auth.fetchMe();
      if (user) {
        Utils.setAvatar(document.getElementById('nav-avatar'), user);
        const n = document.getElementById('nav-name'); if (n) n.textContent = user.full_name;
        const r = document.getElementById('nav-role'); if (r) r.textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);
      }
      Theme.init();
      document.getElementById('theme-toggle')?.addEventListener('click', () => Theme.toggle());

      // Tab switching
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentTab = btn.dataset.tab;
          currentPage = 1;
          loadMeetings();
        });
      });

      document.getElementById('search-input')?.addEventListener('input', Utils.debounce(() => { currentPage = 1; loadMeetings(); }, 300));

      initMeetingsGrid();
      loadMeetings();
      initModals();
    });

    async function loadMeetings() {
      const search = document.getElementById('search-input')?.value.trim() || '';
      const grid = document.getElementById('meetings-grid');
      const label = document.getElementById('count-label');

      try {
        const params = new URLSearchParams({ page: currentPage, limit: PAGE_SIZE });
        if (currentTab) params.set('status', currentTab);
        const res = await API.get(`/api/meetings?${params}`);
        let meetings = res.data?.meetings || res.data || [];
        const total = res.data?.total || meetings.length;

        if (search) meetings = meetings.filter(m => m.title.toLowerCase().includes(search.toLowerCase()));
        if (label) label.textContent = `${total} meeting${total !== 1 ? 's' : ''}`;

        if (!meetings.length) {
          grid.innerHTML = `<div style="text-align:center;padding:var(--space-16) 0;color:var(--text-muted)">
          <div style="font-size:64px;margin-bottom:var(--space-4)">🎬</div>
          <div style="font-size:var(--text-xl);font-weight:700;margin-bottom:var(--space-2)">No meetings found</div>
          <div style="font-size:var(--text-sm);margin-bottom:var(--space-6)">Start a new meeting or adjust the filter above.</div>
          <button class="btn btn-primary" id="btn-create-meeting-fallback">+ Create Meeting</button>
        </div>`;
          document.getElementById('btn-create-meeting-fallback')?.addEventListener('click', () => {
            document.getElementById('new-meeting-modal').classList.remove('hidden');
          });
          document.getElementById('pagination').innerHTML = '';
          return;
        }

        grid.innerHTML = `<div class="meetings-grid">${meetings.map(m => `
        <div class="meeting-card" data-meeting-id="${escHtml(m.meeting_id)}">
          <div class="meeting-status status-${m.status}">
            <span class="status-dot ${m.status}"></span>
            ${m.status.charAt(0).toUpperCase() + m.status.slice(1)}
          </div>
          <div class="meeting-title">${escHtml(m.title)}</div>
          <div class="meeting-meta">
            <span>🆔 ${escHtml(m.meeting_id)}</span>
            ${m.scheduled_at ? `<span>📅 ${Utils.formatDateTime(m.scheduled_at)}</span>` : ''}
            ${m.duration_seconds != null ? `<span>⏱ ${formatDuration(m.duration_seconds)}</span>` : ''}
          </div>
          <div class="meeting-actions">
            ${m.status !== 'ended' && m.status !== 'cancelled' ? `
              <button class="btn btn-primary btn-sm btn-join">
                ${m.status === 'active' ? '▶ Join' : '🚀 Start'}
              </button>
            ` : `<span class="badge badge-gray">${m.status.charAt(0).toUpperCase() + m.status.slice(1)}</span>`}
            <button class="btn btn-ghost btn-icon btn-sm btn-copy" title="Copy link">🔗</button>
          </div>
        </div>
      `).join('')}</div>`;

        renderPagination(total);
      } catch (err) {
        grid.innerHTML = `<div style="text-align:center;padding:var(--space-12);color:var(--text-muted)"><div style="font-size:48px">⚠️</div><div>Failed to load meetings</div></div>`;
        console.error(err);
      }
    }

    function renderPagination(total) {
      const pages = Math.ceil(total / PAGE_SIZE);
      const el = document.getElementById('pagination');
      if (pages <= 1) { el.innerHTML = ''; return; }
      el.innerHTML = Array.from({ length: pages }, (_, i) => i + 1).map(p => `
      <button class="btn btn-sm ${p === currentPage ? 'btn-primary' : 'btn-secondary'} btn-page" data-page="${p}">${p}</button>
    `).join('');
      // Bind listeners to page buttons dynamically
      el.querySelectorAll('.btn-page').forEach(btn => {
        btn.addEventListener('click', () => {
          const p = parseInt(btn.dataset.page);
          if (p) goPage(p);
        });
      });
    }

    function goPage(p) { currentPage = p; loadMeetings(); window.scrollTo(0, 0); }
    function goToMeeting(id) { window.location.href = url('pages/meeting/room.html') + '?id=' + encodeURIComponent(id); }
    function copyLink(id) { Utils.copyToClipboard(window.location.origin + '/frontend/public/pages/meeting/room.html?id=' + id); }
    function formatDuration(s) { const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60); return h ? `${h}h ${m}m` : m ? `${m}m` : `${s}s`; }
    function escHtml(str) { return String(str || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
    function extractMeetingId(value) { try { const u = new URL(value); const p = u.searchParams.get('id'); return p ? extractMeetingId(p) : value; } catch { return value; } }

    function initMeetingsGrid() {
      const grid = document.getElementById('meetings-grid');
      if (!grid) return;
      grid.addEventListener('click', (e) => {
        const card = e.target.closest('.meeting-card');
        if (!card) return;

        const meetingId = card.getAttribute('data-meeting-id');
        if (!meetingId) return;

        const joinBtn = e.target.closest('.btn-join');
        const copyBtn = e.target.closest('.btn-copy');

        if (copyBtn) {
          e.stopPropagation();
          copyLink(meetingId);
          return;
        }

        if (joinBtn || card) {
          goToMeeting(meetingId);
        }
      });
    }

    function initModals() {
      const newModal = document.getElementById('new-meeting-modal');
      const joinModal = document.getElementById('join-modal');

      const openNewModal = () => {
        const el = document.getElementById('m-scheduled');
        if (el && !el.value) {
          const now = new Date(), pad = n => String(n).padStart(2, '0');
          el.value = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
        }
        newModal?.classList.remove('hidden');
      };
      const closeNewModal = () => { newModal?.classList.add('hidden'); const el = document.getElementById('m-scheduled'); if (el) el.value = ''; };
      document.getElementById('new-btn')?.addEventListener('click', openNewModal);
      document.getElementById('close-new-modal')?.addEventListener('click', closeNewModal);
      document.getElementById('cancel-new-modal')?.addEventListener('click', closeNewModal);
      newModal?.addEventListener('click', e => { if (e.target === newModal) closeNewModal(); });

      document.getElementById('new-meeting-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('create-btn');
        btn.disabled = true;
        document.getElementById('create-text').classList.add('hidden');
        document.getElementById('create-spinner').classList.remove('hidden');
        try {
          const res = await API.post('/api/meetings', {
            title: document.getElementById('m-title').value.trim(),
            description: document.getElementById('m-desc').value.trim(),
            scheduled_at: document.getElementById('m-scheduled').value || new Date().toISOString(),
            max_participants: parseInt(document.getElementById('m-max').value),
            password: document.getElementById('m-password').value.trim() || null,
            enable_waiting_room: document.getElementById('m-waiting').checked,
          });
          Toast.success('Meeting created! 🎬', `ID: ${res.data.meeting_id}`);
          newModal.classList.add('hidden');
          document.getElementById('new-meeting-form').reset();
          setTimeout(() => goToMeeting(res.data.meeting_id), 800);
        } catch (err) {
          Toast.error('Failed to create meeting', err.message);
        } finally {
          btn.disabled = false;
          document.getElementById('create-text').classList.remove('hidden');
          document.getElementById('create-spinner').classList.add('hidden');
        }
      });

      document.getElementById('join-btn')?.addEventListener('click', () => joinModal?.classList.remove('hidden'));
      document.getElementById('close-join-modal')?.addEventListener('click', () => joinModal?.classList.add('hidden'));
      joinModal?.addEventListener('click', e => { if (e.target === joinModal) joinModal.classList.add('hidden'); });

      document.getElementById('join-confirm')?.addEventListener('click', () => {
        const raw = document.getElementById('join-id').value.trim();
        const pwd = document.getElementById('join-password').value.trim();
        if (!raw) return Toast.warning('Meeting ID required');
        const id = extractMeetingId(raw);
        let dest = url('pages/meeting/room.html') + '?id=' + encodeURIComponent(id);
        if (pwd) dest += '&pwd=' + encodeURIComponent(pwd);
        window.location.href = dest;
      });
    }
  </script>
</body>
