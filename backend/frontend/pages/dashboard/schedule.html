<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule — ConnectPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/design-system.css">
  <style>
    .schedule-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-xl);
      padding: var(--space-5);
      transition: all var(--transition-base);
      box-shadow: var(--shadow-card);
      cursor: pointer;
    }

    .schedule-card:hover {
      transform: translateY(-2px);
      border-color: rgba(99, 102, 241, 0.35);
      box-shadow: var(--shadow-xl);
    }

    .schedule-time {
      font-size: var(--text-xs);
      font-weight: 700;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: var(--space-2);
    }

    .schedule-title {
      font-size: var(--text-base);
      font-weight: 700;
      margin-bottom: var(--space-1);
    }

    .schedule-meta {
      font-size: var(--text-xs);
      color: var(--text-muted);
      display: flex;
      gap: var(--space-4);
      flex-wrap: wrap;
    }

    .day-label {
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      padding: var(--space-2) 0 var(--space-3);
      border-bottom: 1px solid var(--border-color);
      margin-bottom: var(--space-3);
    }

    .schedule-group {
      margin-bottom: var(--space-8);
    }

    .schedule-grid {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .empty-schedule {
      text-align: center;
      padding: var(--space-16) var(--space-6);
      color: var(--text-muted);
    }

    .empty-schedule-icon {
      font-size: 64px;
      margin-bottom: var(--space-4);
    }
  </style>
</head>

<body>
  <div id="toast-container"></div>
  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">🎥</div>
        <span class="logo-text">ConnectPro</span>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-title">Main</div>
        <a href="index.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
          </svg>
          Dashboard
        </a>
        <a href="meetings.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
              d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.259a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z" />
          </svg>
          Meetings
        </a>
        <a href="schedule.html" class="nav-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
          Schedule
        </a>
        <a href="history.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
          History
        </a>
        <div class="nav-section-title" style="margin-top:12px">Collaboration</div>
        <a href="whiteboard.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z" />
          </svg>
          Whiteboard
        </a>
        <a href="files.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" />
          </svg>
          Files
        </a>
        <div class="nav-section-title" style="margin-top:12px">Account</div>
        <a href="notifications.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" />
          </svg>
          Notifications
        </a>
        <a href="profile.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          Profile
        </a>
        <a href="settings.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" />
          </svg>
          Settings
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-card">
          <div class="avatar avatar-md avatar-purple" id="nav-avatar">?</div>
          <div style="flex:1;min-width:0">
            <div class="user-name" id="nav-name">Loading...</div>
            <div class="user-role" id="nav-role">—</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content" id="main-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">📅 Schedule</h1>
          <p style="font-size:var(--text-sm);color:var(--text-muted);margin-top:2px">Your upcoming scheduled meetings
          </p>
        </div>
        <div style="display:flex;gap:var(--space-3);align-items:center">
          <button class="btn btn-ghost btn-icon" id="theme-toggle">🌙</button>
          <button class="btn btn-primary" id="schedule-btn">+ Schedule Meeting</button>
        </div>
      </div>

      <div class="page-content">
        <!-- Filter bar -->
        <div style="display:flex;gap:var(--space-3);margin-bottom:var(--space-6);flex-wrap:wrap;align-items:center">
          <div class="input-group" style="max-width:280px">
            <span class="input-icon">🔍</span>
            <input type="text" id="search-input" class="form-input" placeholder="Search meetings...">
          </div>
          <select id="range-filter" class="form-select" style="max-width:160px">
            <option value="week">This week</option>
            <option value="month">This month</option>
            <option value="all">All upcoming</option>
          </select>
          <span style="font-size:var(--text-sm);color:var(--text-muted);margin-left:auto"
            id="count-label">Loading...</span>
        </div>

        <!-- Schedule list -->
        <div id="schedule-list">
          <div class="skeleton" style="height:80px;border-radius:12px;margin-bottom:12px"></div>
          <div class="skeleton" style="height:80px;border-radius:12px;margin-bottom:12px;opacity:.7"></div>
          <div class="skeleton" style="height:80px;border-radius:12px;opacity:.4"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Schedule Modal -->
  <div class="modal-overlay hidden" id="schedule-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">📅 Schedule a Meeting</h3>
        <button class="btn btn-ghost btn-icon modal-close" id="close-schedule-modal">✕</button>
      </div>
      <form id="schedule-form" style="display:flex;flex-direction:column;gap:var(--space-4)">
        <div class="form-group">
          <label class="form-label">Meeting Title *</label>
          <input type="text" id="s-title" class="form-input" placeholder="Weekly team standup" required>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" id="s-desc" placeholder="What is this meeting about?"
            style="min-height:72px"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div class="form-group">
            <label class="form-label">Date & Time *</label>
            <input type="datetime-local" id="s-scheduled" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">Max Participants</label>
            <select id="s-max" class="form-select">
              <option value="10">10</option>
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100" selected>100</option>
              <option value="300">300</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password (optional)</label>
          <input type="text" id="s-password" class="form-input" placeholder="Leave blank for no password">
        </div>
        <div style="display:flex;align-items:center;gap:var(--space-3)">
          <label class="checkbox-group">
            <input type="checkbox" id="s-waiting" checked>
            <div class="checkbox-custom"><svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="2" stroke-linecap="round" />
              </svg></div>
            <span style="font-size:var(--text-sm)">Enable waiting room</span>
          </label>
        </div>
        <div style="display:flex;gap:var(--space-3);margin-top:var(--space-2)">
          <button type="button" class="btn btn-secondary flex-1" id="cancel-schedule-modal">Cancel</button>
          <button type="submit" class="btn btn-primary flex-1" id="create-schedule-btn">
            <span id="s-text">Schedule Meeting →</span>
            <span id="s-spinner" class="spinner hidden"></span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="../../js/app.js"></script>
  <script>
    'use strict';
    document.addEventListener('DOMContentLoaded', async () => {
      if (!Auth.requireAuth()) return;
      const user = Auth.getUser() || await Auth.fetchMe();
      if (user) {
        Utils.setAvatar(document.getElementById('nav-avatar'), user);
        const n = document.getElementById('nav-name'); if (n) n.textContent = user.full_name;
        const r = document.getElementById('nav-role'); if (r) r.textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);
      }
      Theme.init();
      document.getElementById('theme-toggle')?.addEventListener('click', () => Theme.toggle());
      loadSchedule();
      initScheduleModal();
      document.getElementById('search-input')?.addEventListener('input', Utils.debounce(loadSchedule, 300));
      document.getElementById('range-filter')?.addEventListener('change', loadSchedule);
    });

    async function loadSchedule() {
      const search = document.getElementById('search-input')?.value.trim() || '';
      const range = document.getElementById('range-filter')?.value || 'week';
      const list = document.getElementById('schedule-list');
      const label = document.getElementById('count-label');

      try {
        const res = await API.get(`/api/meetings?status=scheduled&limit=100`);
        let meetings = (res.data?.meetings || res.data || []);

        const now = new Date();
        const cutoff = range === 'week'
          ? new Date(now.getTime() + 7 * 86400000)
          : range === 'month'
            ? new Date(now.getFullYear(), now.getMonth() + 1, now.getDate())
            : null;

        meetings = meetings.filter(m => {
          if (!m.scheduled_at) return false;
          const d = new Date(m.scheduled_at);
          if (d < now) return false;
          if (cutoff && d > cutoff) return false;
          if (search && !m.title.toLowerCase().includes(search.toLowerCase())) return false;
          return true;
        });

        meetings.sort((a, b) => new Date(a.scheduled_at) - new Date(b.scheduled_at));
        if (label) label.textContent = `${meetings.length} meeting${meetings.length !== 1 ? 's' : ''}`;

        if (!meetings.length) {
          list.innerHTML = `<div class="empty-schedule">
          <div class="empty-schedule-icon">📅</div>
          <div style="font-size:var(--text-xl);font-weight:700;margin-bottom:var(--space-2)">No scheduled meetings</div>
          <div style="font-size:var(--text-sm)">Click "Schedule Meeting" to plan a future meeting.</div>
        </div>`;
          return;
        }

        // Group by day
        const groups = {};
        meetings.forEach(m => {
          const day = new Date(m.scheduled_at).toDateString();
          if (!groups[day]) groups[day] = [];
          groups[day].push(m);
        });

        list.innerHTML = Object.entries(groups).map(([day, items]) => `
        <div class="schedule-group">
          <div class="day-label">${formatDayLabel(day)}</div>
          <div class="schedule-grid">
            ${items.map(m => `
              <div class="schedule-card" onclick="joinMeeting('${escHtml(m.meeting_id)}')">
                <div class="schedule-time">${new Date(m.scheduled_at).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}</div>
                <div class="schedule-title">${escHtml(m.title)}</div>
                <div class="schedule-meta">
                  <span>🆔 ${escHtml(m.meeting_id)}</span>
                  <span>👥 Max ${m.max_participants}</span>
                  ${m.description ? `<span>💬 ${escHtml(m.description.slice(0, 60))}${m.description.length > 60 ? '…' : ''}</span>` : ''}
                </div>
                <div style="display:flex;gap:var(--space-2);margin-top:var(--space-3)">
                  <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();joinMeeting('${escHtml(m.meeting_id)}')">🚀 Start</button>
                  <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();Utils.copyToClipboard(window.location.origin+'/frontend/public/pages/meeting/room.html?id=${escHtml(m.meeting_id)}')" title="Copy invite link">🔗 Copy Link</button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
      } catch (err) {
        list.innerHTML = `<div class="empty-schedule"><div style="font-size:48px">⚠️</div><div>Failed to load schedule</div></div>`;
        console.error(err);
      }
    }

    function formatDayLabel(dateString) {
      const d = new Date(dateString);
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
      d.setHours(0, 0, 0, 0);
      if (d.getTime() === today.getTime()) return 'Today';
      if (d.getTime() === tomorrow.getTime()) return 'Tomorrow';
      return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }

    function joinMeeting(id) {
      window.location.href = url('pages/meeting/room.html') + '?id=' + encodeURIComponent(id);
    }

    function escHtml(str) {
      return String(str || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function initScheduleModal() {
      const modal = document.getElementById('schedule-modal');
      const open = () => {
        // Pre-fill date/time to 1 hour from now
        const dt = new Date(Date.now() + 3600000);
        const pad = n => String(n).padStart(2, '0');
        const local = `${dt.getFullYear()}-${pad(dt.getMonth() + 1)}-${pad(dt.getDate())}T${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
        const el = document.getElementById('s-scheduled'); if (el) el.value = local;
        modal?.classList.remove('hidden');
      };
      const close = () => modal?.classList.add('hidden');

      document.getElementById('schedule-btn')?.addEventListener('click', open);
      document.getElementById('close-schedule-modal')?.addEventListener('click', close);
      document.getElementById('cancel-schedule-modal')?.addEventListener('click', close);
      modal?.addEventListener('click', e => { if (e.target === modal) close(); });

      document.getElementById('schedule-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('create-schedule-btn');
        btn.disabled = true;
        document.getElementById('s-text').classList.add('hidden');
        document.getElementById('s-spinner').classList.remove('hidden');
        try {
          const res = await API.post('/api/meetings', {
            title: document.getElementById('s-title').value.trim(),
            description: document.getElementById('s-desc').value.trim(),
            scheduled_at: document.getElementById('s-scheduled').value,
            max_participants: parseInt(document.getElementById('s-max').value),
            password: document.getElementById('s-password').value.trim() || null,
            enable_waiting_room: document.getElementById('s-waiting').checked,
          });
          Toast.success('Meeting scheduled! 📅', `Scheduled for ${Utils.formatDateTime(res.data.scheduled_at)}`);
          close();
          document.getElementById('schedule-form').reset();
          loadSchedule();
        } catch (err) {
          Toast.error('Failed to schedule meeting', err.message);
        } finally {
          btn.disabled = false;
          document.getElementById('s-text').classList.remove('hidden');
          document.getElementById('s-spinner').classList.add('hidden');
        }
      });
    }
  </script>
</body>

</html>
