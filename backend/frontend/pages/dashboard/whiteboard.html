<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whiteboard — ConnectPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/design-system.css">
  <style>
    body { overflow: hidden; background: #0a0a12; }
    .wb-layout { display: flex; flex-direction: column; height: 100vh; }

    .wb-header {
      height: 52px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; background: #0f0f1a; border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .wb-title { font-size: 14px; font-weight: 700; color: white; }
    .wb-header-actions { display: flex; gap: 8px; align-items: center; }

    .wb-body { display: flex; flex: 1; overflow: hidden; }

    .wb-toolbar {
      width: 52px; background: #0d0d18; border-right: 1px solid rgba(255,255,255,0.06);
      display: flex; flex-direction: column; align-items: center;
      padding: 12px 6px; gap: 4px; overflow-y: auto; flex-shrink: 0;
    }

    .wb-tool {
      width: 40px; height: 40px; border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      color: rgba(255,255,255,0.6); transition: all 0.15s;
      border: 1px solid transparent;
    }
    .wb-tool:hover { background: rgba(255,255,255,0.06); color: white; }
    .wb-tool.active { background: rgba(99,102,241,0.2); border-color: rgba(99,102,241,0.4); color: #a78bfa; }

    .wb-sep { width: 28px; height: 1px; background: rgba(255,255,255,0.08); margin: 4px 0; }

    .canvas-area { flex: 1; position: relative; overflow: hidden; background: #12121e; }
    #wb-canvas { cursor: crosshair; display: block; touch-action: none; }

    .wb-options {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 12px;
      background: rgba(13,13,24,0.95); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 8px 16px; backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    .wb-opt-label { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; }

    .color-swatch {
      width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: all 0.15s; flex-shrink: 0;
    }
    .color-swatch.active { border-color: white; transform: scale(1.2); }

    .stroke-slider { width: 80px; accent-color: #6366f1; }

    .color-input { display: none; }

    .wb-hint { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); font-size: 11px; color: rgba(255,255,255,0.3); pointer-events: none; white-space: nowrap; }
  </style>
</head>
<body>
  <div id="toast-container"></div>

  <div class="wb-layout">
    <!-- Header -->
    <div class="wb-header">
      <div style="display:flex;align-items:center;gap:12px">
        <a href="index.html" class="btn btn-ghost btn-icon-sm" style="color:rgba(255,255,255,0.6)">←</a>
        <span class="wb-title">🎨 Whiteboard</span>
        <span style="font-size:11px;color:rgba(255,255,255,0.3)" id="wb-sync-status">Live</span>
      </div>
      <div class="wb-header-actions">
        <button class="btn btn-ghost btn-sm" id="wb-undo-btn" title="Undo (Ctrl+Z)">↩ Undo</button>
        <button class="btn btn-ghost btn-sm" id="wb-redo-btn" title="Redo (Ctrl+Y)">↪ Redo</button>
        <button class="btn btn-secondary btn-sm" id="wb-clear-btn">🗑 Clear</button>
        <button class="btn btn-secondary btn-sm" id="wb-download-btn">⬇ Download PNG</button>
        <button class="btn btn-primary btn-sm" id="wb-save-btn">💾 Save</button>
      </div>
    </div>

    <div class="wb-body">
      <!-- Toolbar -->
      <div class="wb-toolbar">
        <div class="wb-tool active" id="tool-pen" title="Pen (P)" data-tool="pen">✏️</div>
        <div class="wb-tool" id="tool-brush" title="Brush (B)" data-tool="brush">🖌️</div>
        <div class="wb-tool" id="tool-eraser" title="Eraser (E)" data-tool="eraser">🧹</div>
        <div class="wb-sep"></div>
        <div class="wb-tool" id="tool-line" title="Line" data-tool="line">╱</div>
        <div class="wb-tool" id="tool-rect" title="Rectangle" data-tool="rect">□</div>
        <div class="wb-tool" id="tool-circle" title="Circle" data-tool="circle">○</div>
        <div class="wb-tool" id="tool-arrow" title="Arrow" data-tool="arrow">➜</div>
        <div class="wb-sep"></div>
        <div class="wb-tool" id="tool-text" title="Text (T)" data-tool="text">T</div>
        <div class="wb-sep"></div>
        <div class="wb-tool" id="tool-select" title="Select" data-tool="select">⊹</div>
      </div>

      <!-- Canvas -->
      <div class="canvas-area" id="canvas-area">
        <canvas id="wb-canvas"></canvas>
        <div class="wb-hint" id="wb-hint">Select a tool and start drawing</div>

        <!-- Options Bar -->
        <div class="wb-options">
          <span class="wb-opt-label">Color</span>
          <div style="display:flex;gap:6px;align-items:center">
            <div class="color-swatch active" style="background:#ffffff" data-color="#ffffff"></div>
            <div class="color-swatch" style="background:#f87171" data-color="#f87171"></div>
            <div class="color-swatch" style="background:#fb923c" data-color="#fb923c"></div>
            <div class="color-swatch" style="background:#facc15" data-color="#facc15"></div>
            <div class="color-swatch" style="background:#4ade80" data-color="#4ade80"></div>
            <div class="color-swatch" style="background:#60a5fa" data-color="#60a5fa"></div>
            <div class="color-swatch" style="background:#a78bfa" data-color="#a78bfa"></div>
            <div class="color-swatch" style="background:#f472b6" data-color="#f472b6"></div>
            <label class="color-swatch" style="background: conic-gradient(red, yellow, green, cyan, blue, magenta, red);cursor:pointer;overflow:hidden;position:relative" title="Custom color">
              <input type="color" id="custom-color" class="color-input">
            </label>
          </div>
          <div class="wb-sep" style="width:1px;height:24px;background:rgba(255,255,255,0.1);margin:0"></div>
          <span class="wb-opt-label">Size</span>
          <input type="range" id="stroke-size" class="stroke-slider" min="1" max="40" value="4">
          <span id="stroke-size-display" style="font-size:11px;color:rgba(255,255,255,0.5);min-width:24px">4px</span>
          <div class="wb-sep" style="width:1px;height:24px;background:rgba(255,255,255,0.1);margin:0"></div>
          <span class="wb-opt-label">Opacity</span>
          <input type="range" id="stroke-opacity" class="stroke-slider" min="10" max="100" value="100">
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.6.2/socket.io.min.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/whiteboard.js"></script>
</body>
</html>
