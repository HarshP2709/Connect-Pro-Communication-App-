<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — ConnectPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/design-system.css">
  <style>
    body { background: var(--gradient-hero); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: var(--space-4); }
    .auth-container { width: 100%; max-width: 440px; }
    .auth-card { background: var(--bg-card); backdrop-filter: var(--blur-lg); border: 1px solid var(--border-card); border-radius: var(--radius-2xl); padding: var(--space-10); box-shadow: var(--shadow-xl), var(--shadow-glow); }
    .auth-logo { display: flex; align-items: center; gap: var(--space-3); justify-content: center; margin-bottom: var(--space-8); }
    .orb-bg { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); }
    .orb-1 { width: 500px; height: 500px; background: rgba(99,102,241,0.12); top: -200px; right: -150px; animation: float 8s ease-in-out infinite; }
    .auth-container { position: relative; z-index: 1; }
    .back-icon { font-size: 48px; margin-bottom: var(--space-4); }
    .success-state { text-align: center; display: none; }
    .success-state.visible { display: block; }
    .form-state.hidden { display: none; }
  </style>
</head>
<body>
  <div id="toast-container"></div>
  <div class="orb-bg"><div class="orb orb-1"></div></div>

  <div class="auth-container fade-in">
    <div class="auth-logo">
      <div class="logo-icon">🎥</div>
      <span style="font-size:var(--text-2xl);font-weight:900" class="gradient-text">ConnectPro</span>
    </div>

    <div class="auth-card">
      <!-- Form State -->
      <div class="form-state" id="form-state">
        <div style="font-size:48px;margin-bottom:var(--space-4);text-align:center">🔐</div>
        <h1 style="font-size:var(--text-3xl);font-weight:800;text-align:center;margin-bottom:var(--space-2)">Forgot Password?</h1>
        <p style="color:var(--text-muted);font-size:var(--text-sm);text-align:center;margin-bottom:var(--space-8)">No worries. Enter your email and we'll send you a reset link.</p>

        <form id="forgot-form" style="display:flex;flex-direction:column;gap:var(--space-5)">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-icon">✉️</span>
              <input type="email" id="email" class="form-input" placeholder="you@company.com" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-full btn-lg" id="reset-btn">
            <span id="reset-text">Send Reset Link →</span>
            <span id="reset-spinner" class="spinner hidden"></span>
          </button>
        </form>

        <div style="text-align:center;margin-top:var(--space-6);font-size:var(--text-sm);color:var(--text-muted)">
          Remembered it? <a href="login.html" style="color:var(--text-accent);font-weight:600">Back to Sign In</a>
        </div>
      </div>

      <!-- Success State -->
      <div class="success-state" id="success-state">
        <div style="font-size:56px;margin-bottom:var(--space-4)">📬</div>
        <h2 style="font-size:var(--text-2xl);font-weight:800;margin-bottom:var(--space-3)">Check your email</h2>
        <p style="color:var(--text-muted);font-size:var(--text-sm);margin-bottom:var(--space-8)" id="success-message">We sent a password reset link to your email address.</p>
        <a href="login.html" class="btn btn-primary w-full">← Back to Sign In</a>
        <p style="margin-top:var(--space-5);color:var(--text-muted);font-size:var(--text-xs)">Didn't receive it? Check spam or <a href="#" id="resend-link" style="color:var(--text-accent)">resend</a>.</p>
      </div>
    </div>
  </div>

  <script src="../../js/app.js"></script>
  <script src="../../js/auth.js"></script>
</body>
</html>
